[model]
type = "neural_bigram"
dtype = "Float32"
init = "normal"
init_scale = 0.01

[data]
corpus = "data/raw/tiny_corpus.txt"
train_ratio = 0.8
validation_ratio = 0.1
batch_size = 64
seed = 42

[training]
optimizer = "sgd"
learning_rate = 0.1
max_steps = 2000
eval_interval = 100
eval_max_predictions = 1000000

[generation]
seed = 42
max_new_tokens = 300
temperature = 1.0

[checkpoint]
directory = "checkpoints/phase2"
filename = "neural_bigram.bin"
